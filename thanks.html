<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks — Sam Padrul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;700&family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #111;
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    h1 {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 2.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    p {
      color: #777;
      font-size: 1rem;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid #ccc;
      border-radius: 6px;
      text-decoration: none;
      color: #111;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    a:hover { border-color: #111; }
  </style>
</head>
<body>
  <h1>You're in.</h1>
  <p>Thanks for subscribing — you'll hear from me when there's something worth sharing.</p>
  <a href="/">← Back to sampadrul.com</a>
